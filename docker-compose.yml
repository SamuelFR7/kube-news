services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: samuelfr7/kube-news:v1
    container_name: kube-news-app
    environment:
      NODE_ENV: development
      DB_DATABASE: kubedevnews
      DB_USERNAME: kubedevnews
      DB_PASSWORD: Pg#123
      DB_HOST: db
      DB_PORT: 5432
      DB_SSL_REQUIRE: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./src:/usr/src/app
      - app_node_modules:/usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: kube-news-db
    environment:
      POSTGRES_DB: kubedevnews
      POSTGRES_USER: kubedevnews
      POSTGRES_PASSWORD: Pg#123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubedevnews -d kubedevnews"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  app_node_modules:
  postgres_data:
