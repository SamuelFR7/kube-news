# Kube News Kubernetes manifests
# Apply with: kubectl apply -f k8s/kube-news.yaml
#
# Resource order is hierarchical:
# 1. Application namespace
# 2. Shared configuration and credentials
# 3. Database storage and network
# 4. Database workload
# 5. Application network
# 6. Application workload
---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-news
  labels:
    app.kubernetes.io/name: kube-news
    app.kubernetes.io/part-of: kube-news
---
apiVersion: v1
kind: Secret
metadata:
  name: kube-news-db-secret
  namespace: kube-news
  labels:
    app.kubernetes.io/name: kube-news
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: kube-news
type: Opaque
stringData:
  POSTGRES_DB: kubedevnews
  POSTGRES_USER: kubedevnews
  POSTGRES_PASSWORD: "Pg#123"
  DB_DATABASE: kubedevnews
  DB_USERNAME: kubedevnews
  DB_PASSWORD: "Pg#123"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-news-config
  namespace: kube-news
  labels:
    app.kubernetes.io/name: kube-news
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: kube-news
data:
  NODE_ENV: production
  DB_HOST: kube-news-postgres
  DB_PORT: "5432"
  DB_SSL_REQUIRE: "false"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kube-news-postgres-data
  namespace: kube-news
  labels:
    app.kubernetes.io/name: kube-news
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: kube-news
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kube-news-postgres
  namespace: kube-news
  labels:
    app.kubernetes.io/name: kube-news
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: kube-news
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kube-news
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-news-postgres
  namespace: kube-news
  labels:
    app.kubernetes.io/name: kube-news
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: kube-news
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-news
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-news
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: kube-news
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: kube-news-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: kube-news-app
  namespace: kube-news
  labels:
    app.kubernetes.io/name: kube-news
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: kube-news
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: kube-news
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-news-app
  namespace: kube-news
  labels:
    app.kubernetes.io/name: kube-news
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: kube-news
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-news
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-news
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: kube-news
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: DB_USERNAME
          command:
            - /bin/sh
            - -c
            - until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USERNAME" -d "$DB_DATABASE"; do echo "waiting for postgres"; sleep 2; done
      containers:
        - name: app
          image: samuelfr7/kube-news:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: kube-news-config
          env:
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
