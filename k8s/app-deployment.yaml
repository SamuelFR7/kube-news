apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-news-app
  labels:
    app.kubernetes.io/name: kube-news
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-news
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-news
        app.kubernetes.io/component: app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: DB_USERNAME
          command:
            - /bin/sh
            - -c
            - until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USERNAME" -d "$DB_DATABASE"; do echo "waiting for postgres"; sleep 2; done
      containers:
        - name: app
          image: samuelfr7/kube-news:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: kube-news-config
          env:
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kube-news-db-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
